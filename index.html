<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="controls">
            <div class="slider-container">
                <label for="translateX">Translate X:</label>
                <input type="range" id="translateX" min="-250" max="250" value="0">
            </div>
            <div class="slider-container">
                <label for="rotate">Rotate:</label>
                <input type="range" id="rotate" min="0" max="360" value="0">
            </div>
            <div class="slider-container">
                <label for="scale">Scale:</label>
                <input type="range" id="scale" min="0.1" max="2" step="0.1" value="1">
            </div>
            <div class="slider-container">
                <label for="color">Color:</label>
                <input type="color" id="color" value="#3498db">
            </div>
        </div>
        <div class="house-container">
            <div class="house">
                <div class="roof"></div>
                <div class="walls"></div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
