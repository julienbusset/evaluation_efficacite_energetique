<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="controls">
            <div class="slider-container">
                <label for="roofThickness">Épaisseur du toit:</label>
                <input type="range" id="roofThickness" min="1" max="50" value="10">
                <span class="slider-value" id="roofThicknessValue">10 mm</span>
            </div>
            <div class="slider-container">
                <label for="wallsThickness">Épaisseur des murs:</label>
                <input type="range" id="wallsThickness" min="1" max="50" value="10">
                <span class="slider-value" id="wallsThicknessValue">10 mm</span>
            </div>
            <div class="slider-container">
                <label for="roofR">Paramètre R du toit:</label>
                <input type="range" id="roofR" min="0" max="10" step="0.1" value="1">
                <span class="slider-value" id="roofRValue">1.0</span>
            </div>
            <div class="slider-container">
                <label for="wallsR">Paramètre R des murs:</label>
                <input type="range" id="wallsR" min="0" max="10" step="0.1" value="1">
                <span class="slider-value" id="wallsRValue">1.0</span>
            </div>
        </div>
        <div class="house-container">
            <div class="sun-container">
                <div class="sun"></div>
                <div class="sun-label">1000 watts</div>
            </div>
            <div class="house">
                <div class="roof"></div>
                <div class="walls"></div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
